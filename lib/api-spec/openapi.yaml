openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Willamette Valley Map API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: markers
    description: Map marker operations
  - name: openai
    description: OpenAI AI chat, image, and audio operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /markers:
    get:
      operationId: getMarkers
      tags: [markers]
      summary: Get all markers
      description: Returns all saved map markers
      responses:
        "200":
          description: List of markers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Marker"
    post:
      operationId: createMarker
      tags: [markers]
      summary: Create a marker
      description: Add a new marker to the map. Requires admin key.
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMarkerInput"
      responses:
        "201":
          description: Created marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized — missing or invalid admin key
        "503":
          description: Admin operations not configured
  /markers/{id}:
    get:
      operationId: getMarker
      tags: [markers]
      summary: Get a single marker
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "404":
          description: Not found
    put:
      operationId: updateMarker
      tags: [markers]
      summary: Update a marker
      description: Requires admin key.
      security:
        - adminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMarkerInput"
      responses:
        "200":
          description: Updated marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized — missing or invalid admin key
        "404":
          description: Not found
        "503":
          description: Admin operations not configured
    delete:
      operationId: deleteMarker
      tags: [markers]
      summary: Delete a marker
      description: Requires admin key.
      security:
        - adminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized — missing or invalid admin key
        "404":
          description: Not found
        "503":
          description: Admin operations not configured
  /openai/conversations:
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation (includes sessionToken required for all subsequent requests)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      security:
        - conversationToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "401":
          description: Missing conversation token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
        "403":
          description: Forbidden — token does not match conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      security:
        - conversationToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Missing conversation token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
        "403":
          description: Forbidden — token does not match conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      security:
        - conversationToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
        "401":
          description: Missing conversation token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
        "403":
          description: Forbidden — token does not match conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      security:
        - conversationToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
        "400":
          description: Missing or too-long content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
        "401":
          description: Missing conversation token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
        "403":
          description: Forbidden — token does not match conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /markers/stats:
    get:
      operationId: getMarkerStats
      tags: [markers]
      summary: Get marker statistics
      description: Returns counts grouped by category
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkerStats"
components:
  securitySchemes:
    adminKey:
      type: apiKey
      in: header
      name: x-admin-key
      description: Admin API key required for marker write operations (create, update, delete)
    conversationToken:
      type: apiKey
      in: header
      name: x-conversation-token
      description: Per-conversation capability token returned at conversation creation. Required for all read, write, and delete operations on a specific conversation.
  schemas:
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        sessionToken:
          type: string
          description: Opaque token that must be supplied as X-Conversation-Token for all subsequent requests on this conversation.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - sessionToken
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
          maxLength: 2000
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Marker:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        note:
          type: string
        category:
          type: string
          enum: [winery, restaurant, farmstand, artisan]
        lat:
          type: number
        lng:
          type: number
        website:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - note
        - category
        - lat
        - lng
        - createdAt
    CreateMarkerInput:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        note:
          type: string
          maxLength: 2000
        category:
          type: string
          enum: [winery, restaurant, farmstand, artisan]
        lat:
          type: number
          minimum: 43.0
          maximum: 47.0
        lng:
          type: number
          minimum: -125.0
          maximum: -120.5
        website:
          type: string
          format: uri
          pattern: "^https?://"
          maxLength: 500
          nullable: true
        city:
          type: string
          maxLength: 100
          nullable: true
      required:
        - name
        - note
        - category
        - lat
        - lng
    UpdateMarkerInput:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        note:
          type: string
          maxLength: 2000
        category:
          type: string
          enum: [winery, restaurant, farmstand, artisan]
        lat:
          type: number
          minimum: 43.0
          maximum: 47.0
        lng:
          type: number
          minimum: -125.0
          maximum: -120.5
        website:
          type: string
          format: uri
          pattern: "^https?://"
          maxLength: 500
          nullable: true
        city:
          type: string
          maxLength: 100
          nullable: true
    MarkerStats:
      type: object
      properties:
        total:
          type: integer
        wineries:
          type: integer
        restaurants:
          type: integer
        farmstands:
          type: integer
        artisans:
          type: integer
      required:
        - total
        - wineries
        - restaurants
        - farmstands
        - artisans
